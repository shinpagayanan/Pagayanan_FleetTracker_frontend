{% extends "dashboard/dashboard_base.html" %}

{% block role_content %}
<style>
*{box-sizing:border-box}
.back-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#6b6b6b;text-decoration:none;margin-bottom:1.25rem;font-family:'Georgia',serif}
.back-link:hover{color:#1a3a5c}
.confirm-card{background:#fff;border:1px solid #e2e0da;border-radius:10px;padding:1.5rem;max-width:460px}
.card-icon{width:44px;height:44px;border-radius:10px;background:#fcebeb;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
.confirm-card h2{font-size:18px;font-weight:500;color:#1a1a1a;margin:0 0 .5rem;font-family:'Georgia',serif}
.confirm-desc{font-size:13px;color:#6b6b6b;margin:0 0 1.5rem;font-family:'Georgia',serif;line-height:1.6}
.warning-box{display:flex;align-items:flex-start;gap:8px;background:#faeeda;border:1px solid #f5dab8;border-radius:7px;padding:10px 12px;margin-bottom:1.5rem;font-size:12px;color:#854f0b;font-family:'Georgia',serif;line-height:1.5}
.form-divider{height:1px;background:#f0ede8;margin:0 0 1.25rem}
.form-actions{display:flex;align-items:center;gap:8px}
.btn-danger{display:inline-flex;align-items:center;gap:6px;background:#a32d2d;color:#fff;padding:9px 20px;border-radius:7px;font-size:13px;font-family:'Georgia',serif;border:none;cursor:pointer;transition:background .15s}
.btn-danger:hover{background:#872424}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#4a4a4a;text-decoration:none;padding:8px 16px;border-radius:7px;font-size:13px;font-family:'Georgia',serif;border:1px solid #e2e0da;cursor:pointer;transition:background .15s}
.btn-secondary:hover{background:#f4f3ef}
</style>

<a href="{% url 'user-list' %}" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    Back to users
</a>

<div class="confirm-card">
    <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a32d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </div>
    <h2>Delete user</h2>
    <p class="confirm-desc">Are you sure you want to delete this user? This action cannot be undone.</p>
    <div class="warning-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        All data associated with this user will be permanently removed.
    </div>
    <div class="form-divider"></div>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn-danger">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                Yes, delete user
            </button>
            <a href="{% url 'user-list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
