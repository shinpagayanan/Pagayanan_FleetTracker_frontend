<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Georgia', serif;
            background: #f4f3ef;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        p { margin-bottom: 1rem; }
        p label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #4a4a4a;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        p input {
            width: 100%;
            padding: 9px 12px;
            font-size: 14px;
            font-family: 'Georgia', serif;
            color: #1a1a1a;
            background: #ffffff;
            border: 1px solid #e2e0da;
            border-radius: 7px;
            outline: none;
            transition: border-color 0.15s;
        }
        p input:focus { border-color: #1a3a5c; }
        p input::placeholder { color: #b0aea8; }
        button[type="submit"] {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-family: 'Georgia', serif;
            font-weight: 600;
            color: #ffffff;
            background: #1a3a5c;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: background 0.15s;
            margin-top: 4px;
        }
        button[type="submit"]:hover { background: #142e4a; }
        button[type="submit"]:active { background: #0f2337; }
    </style>
</head>
<body>

<div style="
    background: #ffffff;
    border: 1px solid #e2e0da;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
">

    <!-- Brand mark -->
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">
        <div style="
            width: 32px; height: 32px;
            border-radius: 7px;
            background: #1a3a5c;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        ">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
        </div>
        <div>
            <p style="font-size: 13px; font-weight: 600; color: #1a1a1a; margin: 0; line-height: 1.2;">University Asset</p>
            <p style="font-size: 11px; color: #6b6b6b; margin: 0; line-height: 1.2; letter-spacing: 0.03em;">&amp; Fleet Tracker</p>
        </div>
    </div>

    <!-- Heading -->
    <h2 style="font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 0.25rem;">Sign in</h2>
    <p style="font-size: 13px; color: #6b6b6b; margin-bottom: 1.75rem;">Enter your credentials to continue.</p>

    {% if form.non_field_errors %}

<div style="
    background:#fdeaea;
    color:#a12b2b;
    border:1px solid #e3b4b4;
    padding:12px;
    border-radius:8px;
    margin-bottom:16px;
">

    {% for error in form.non_field_errors %}

        <p>{{ error }}</p>

    {% endfor %}

</div>

{% endif %}

    <!-- Form -->
    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
